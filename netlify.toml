[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/aladin"
  to = "/.netlify/functions/aladin"
  status = 200

[[redirects]]
  from = "/api/notion/*"
  to = "/.netlify/functions/notion-proxy?notionPath=:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
